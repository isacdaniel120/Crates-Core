name: Build CrateCore

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show structure
        run: find . -name "pom.xml"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -B
        working-directory: CrateCore

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: CrateCore
          path: CrateCore/target/CrateCore-*.jar
          if-no-files-found: error
